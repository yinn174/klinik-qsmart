<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QSmart+ Customer Portal</title>
    <link rel="stylesheet" href="customer.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Memastikan warna tema ungu & kuning anda sentiasa konsisten */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .header {
            background-color: #7b4397; /* Warna Ungu Asal */
            color: white;
            text-align: center;
            padding: 35px 20px;
        }
        .header h1 { margin: 0; font-size: 2.2rem; font-weight: 700; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0 0; font-size: 0.9rem; letter-spacing: 2px; opacity: 0.9; }
        
        .card { padding: 30px 24px; text-align: center; }
        .card h2 { color: #333; font-size: 1.5rem; margin-top: 0; font-weight: 600; }
        .instruction { color: #666; font-size: 0.95rem; margin-bottom: 20px; }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #7b4397;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
            color: #333;
        }
        
        button {
            width: 100%;
            background-color: #f5b041; /* Warna Kuning Asal */
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #dc9628; }
        
        .statusCard { padding: 0 24px 30px 24px; display: none; }
        .statusCard h2 { color: #333; font-size: 1.3rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 1rem; }
        .row span { color: #666; }
        .row strong { color: #333; font-weight: 700; }
        
        .progressTitle { font-size: 0.9rem; font-weight: 600; color: #666; margin-top: 20px; margin-bottom: 8px; }
        .progressBar { background-color: #e5e7eb; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; }
        .progress { background-color: #7b4397; height: 100%; width: 0%; transition: width 0.5s ease; }
        
        .footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #999; border-top: 1px solid #f3f4f6; }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>QSmart+</h1>
        <p>KLINIK KESIHATAN</p>
    </div>

    <div class="card">
        <h2>Customer Queue Tracking</h2>
        <p class="instruction">Please enter your queue number</p>
        <input type="text" id="queueInput" placeholder="Example : S001">
        <button onclick="checkQueue()">CHECK STATUS</button>
    </div>

    <div class="statusCard" id="statusCard">
        <h2>Your Queue Status</h2>

        <div class="row">
            <span>Queue Number</span>
            <strong id="queueNumber">-</strong>
        </div>

        <div class="row">
            <span>Status</span>
            <strong id="status">Waiting</strong>
        </div>

        <div class="row">
            <span>Queue Type</span>
            <strong id="queueType">Normal</strong>
        </div>

        <div class="row">
            <span>Customers Ahead</span>
            <strong id="ahead">0</strong>
        </div>

        <div class="row">
            <span>Estimated Waiting Time</span>
            <strong id="waiting">0 Minutes</strong>
        </div>

        <div class="row">
            <span>Current Serving</span>
            <strong id="serving">-</strong>
        </div>

        <div class="progressTitle">Queue Progress</div>
        <div class="progressBar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div class="footer">
        Universiti Teknologi MARA (UiTM)
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// Menyimpan data realtime terkini dari pelayan Render
let globalQueueData = {
    currentServing: "-",
    waiting: [],
    priority: [],
    skipped: []
};

// Fungsi Audio: Text-to-Speech Panggilan Suara Bahasa Melayu
function bunyikanSuara(teks) {
    if ('speechSynthesis' in window && teks !== "-") {
        let sebutan = `Nombor giliran. ${teks.split('').join('. ')}. Sila masuk ke kaunter.`;
        let speech = new SpeechSynthesisUtterance(sebutan);
        speech.lang = 'ms-MY';
        speech.rate = 0.8;
        window.speechSynthesis.speak(speech);
    }
}

// 1. Menerima data masa nyata menerusi Socket.io
socket.on('updateQueue', (data) => {
    // Jika nombor dipanggil berubah, jalankan panggilan suara automatik
    if (globalQueueData.currentServing !== data.currentServing && data.currentServing !== "-") {
        bunyikanSuara(data.currentServing);
    }

    globalQueueData.currentServing = data.currentServing || "-";
    globalQueueData.waiting = data.waiting || [];
    globalQueueData.priority = data.priority || [];
    globalQueueData.skipped = data.skipped || [];
    
    // Auto-refresh status sekiranya pelanggan sedang membuka kad status
    const activeSearch = document.getElementById("queueNumber").innerText;
    if (activeSearch !== "-") {
        refreshStatus(activeSearch);
    }
});

// 2. Mendengar isyarat RECALL daripada portal staf
socket.on('triggerRecallAudio', (tiket) => {
    if (tiket && tiket !== "-") {
        bunyikanSuara(tiket);
    }
});

function checkQueue() {
    const inputElement = document.getElementById("queueInput");
    const inputVal = inputElement.value.trim().toUpperCase();
    
    if (inputVal === "") {
        alert("Please enter a queue number.");
        return;
    }
    
    // Melepaskan kebenaran sekatan audio pelayar Chrome/Edge secara senyap
    if ('speechSynthesis' in window) {
        let dummySpeech = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(dummySpeech);
    }
    
    refreshStatus(inputVal);
    inputElement.value = ""; // Ditambah untuk membersihkan kotak teks selepas semakan dibuat
}

function refreshStatus(inputVal) {
    let status = "";
    let queueType = inputVal.startsWith('P') ? "Priority" : "Normal";
    let ahead = 0;
    let estimatedTime = 0;
    let progressPercent = 0;

    // Semak kedudukan nombor di dalam struktur data Render dengan logik nisbah adil yang betul
    if (globalQueueData.currentServing === inputVal) {
        status = "Serving (Sila Masuk)";
        ahead = 0;
        estimatedTime = 0;
        progressPercent = 100;
    }
    else if (globalQueueData.waiting.includes(inputVal)) {
        status = "Waiting";
        let posisiSiri = globalQueueData.waiting.indexOf(inputVal);
        
        // Membetulkan logik ahead: Orang dalam barisan Normal perlu menunggu giliran priority juga
        ahead = posisiSiri + globalQueueData.priority.length;
        estimatedTime = (ahead + 1) * 3;
        progressPercent = Math.max(10, 90 - (posisiSiri * 10));
    }
    else if (globalQueueData.priority.includes(inputVal)) {
        status = "Waiting";
        let posisiPrio = globalQueueData.priority.indexOf(inputVal);
        
        ahead = posisiPrio;
        estimatedTime = (ahead + 1) * 2;
        progressPercent = Math.max(10, 90 - (posisiPrio * 10));
    }
    else if (globalQueueData.skipped.includes(inputVal)) {
        status = "Skipped (Sila ke Kaunter)";
        ahead = "-";
        estimatedTime = "-";
        progressPercent = 50;
    }
    else {
        alert("Queue number not found.");
        document.getElementById("statusCard").style.display = "none";
        return;
    }

    // Paparkan maklumat yang diproses ke paparan UI
    document.getElementById("queueNumber").innerText = inputVal;
    document.getElementById("status").innerText = status;
    document.getElementById("queueType").innerText = queueType;
    document.getElementById("ahead").innerText = ahead;
    document.getElementById("waiting").innerText = typeof estimatedTime === 'number' ? estimatedTime + " Minutes" : estimatedTime;
    document.getElementById("serving").innerText = globalQueueData.currentServing;
    document.getElementById("progress").style.width = progressPercent + "%";

    document.getElementById("statusCard").style.display = "block";
}
</script>
</body>
</html>
