<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Skrin Paparan Pelanggan</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #2c3e50; color: white; padding: 50px; }
        .container { background: #34495e; padding: 40px; border-radius: 20px; display: inline-block; width: 80%; max-width: 500px; }
        h2 { letter-spacing: 2px; }
        .display-box { font-size: 100px; background: #1abc9c; padding: 20px; border-radius: 10px; margin: 30px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>NOMBOR GILIRAN</h2>
        <div class="display-box" id="skrinNombor">---</div>
        <p id="statusMesej">Sila tunggu giliran anda ditayangkan</p>
    </div>

    <script>
        const socket = io();
        socket.on('tiketBaru', (noTiket) => {
            document.getElementById('skrinNombor').innerText = noTiket;
            panggilSuara(noTiket);
        });

        function panggilSuara(noTiket) {
            let susunanSuara = "Nombor giliran, " + noTiket.split('').join(', ');
            let ucapan = new SpeechSynthesisUtterance(susunanSuara);
            ucapan.lang = 'id-ID'; // Menggunakan suara melayu/indonesia terdekat
            ucapan.rate = 0.9;
            window.speechSynthesis.speak(ucapan);
        }
    </script>
</body>
</html>
