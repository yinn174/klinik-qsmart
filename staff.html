<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrin Panggilan Staf</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #162447;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h1 { color: #e43f5a; margin-bottom: 10px; }
        p { color: #cbd5e1; font-size: 1.1rem; }
        
        .display-box {
            background-color: #1f4068;
            padding: 30px;
            border-radius: 15px;
            margin: 25px 0;
            border: 2px solid #e43f5a;
        }
        .label { font-size: 1.2rem; color: #00fff0; letter-spacing: 1px; }
        .number { font-size: 4rem; font-weight: bold; margin: 10px 0; color: #ffffff; }
        
        .btn-group {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }
        .btn-row {
            display: flex;
            gap: 15px;
            width: 100%;
        }
        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-next { background-color: #00b4d8; color: white; }
        .btn-next:hover { background-color: #0096c7; }
        .btn-recall { background-color: #f77f00; color: white; flex: 1; }
        .btn-recall:hover { background-color: #fcbf49; }
        .btn-skip { background-color: #e43f5a; color: white; flex: 1; }
        .btn-skip:hover { background-color: #c72c44; }
        
        .status-text { margin-top: 15px; font-size: 0.9rem; color: #a8dadc; }
    </style>
</head>
<body>

    <div class="container">
        <h1>KAUNTER STAF</h1>
        <p>Sistem Pengurusan Giliran Klinik</p>

        <div class="display-box">
            <div class="label" id="namaKaunterPapar">KAUNTER UTAMA BERPUSAT</div>
            <div class="number" id="noSemasaPapar">---</div>
        </div>

        <div class="btn-group">
            <button class="btn-next" onclick="panggilSeterusnya()">CALL NEXT 📢</button>
            <div class="btn-row">
                <button class="btn-recall" onclick="panggilSemula()">RECALL 🔄</button>
                <button class="btn-skip" onclick="skipTiket()">SKIP ⏭️</button>
            </div>
        </div>

        <div class="status-text" id="statusPapar">Menghubungkan ke server...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Menerima kemaskini masa nyata daripada server untuk paparan nombor semasa
        socket.on('updateQueue', (data) => {
            document.getElementById("noSemasaPapar").innerText = data.currentServing || "---";
            
            const pCount = data.priority ? data.priority.length : 0;
            const sCount = data.waiting ? data.waiting.length : 0;
            
            document.getElementById("statusPapar").innerText = `Menunggu — Prio: ${pCount} | Normal: ${sCount}`;
        });

        // FUNGSI UTAMA: Panggil tiket seterusnya
        async function panggilSeterusnya() {
            try {
                const respon = await fetch('/api/panggil-next');
                const data = await respon.json();
                if (data.status === "gagal") {
                    document.getElementById("statusPapar").innerText = "Tiada tiket menunggu dalam senarai.";
                }
            } catch (ralat) {
                document.getElementById("statusPapar").innerText = "Ralat berhubung dengan server.";
            }
        }

        // FUNGSI KEDUA: Panggil semula nombor yang sama (Recall)
        async function panggilSemula() {
            try {
                const respon = await fetch('/api/recall');
                const data = await respon.json();
                if (data.status === "berjaya") {
                    document.getElementById("statusPapar").innerText = "Recall berjaya dipancarkan.";
                }
            } catch (ralat) {
                document.getElementById("statusPapar").innerText = "Ralat semasa melakukan Recall.";
            }
        }

        // FUNGSI KETIGA: Lepaskan nombor (Skip)
        async function skipTiket() {
            try {
                const respon = await fetch('/api/skip');
                const data = await respon.json();
                if (data.status === "berjaya") {
                    document.getElementById("statusPapar").innerText = "Tiket berjaya dilepaskan (Skipped).";
                }
            } catch (ralat) {
                document.getElementById("statusPapar").innerText = "Ralat semasa melakukan Skip.";
            }
        }
    </script>
</body>
</html>
