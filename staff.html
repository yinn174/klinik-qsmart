<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrin Panggilan Staf</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #162447;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h1 { color: #e43f5a; margin-bottom: 10px; }
        p { color: #cbd5e1; font-size: 1.1rem; }
        
        .setup-section {
            margin: 30px 0;
            padding: 15px;
            background: #1f4068;
            border-radius: 10px;
        }
        select {
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: none;
            width: 100%;
            box-sizing: border-box;
            background-color: #ffffff;
            color: #333;
            font-weight: bold;
        }
        
        .display-box {
            background-color: #1f4068;
            padding: 30px;
            border-radius: 15px;
            margin: 25px 0;
            border: 2px solid #e43f5a;
        }
        .label { font-size: 1.2rem; color: #00fff0; letter-spacing: 1px; }
        .number { font-size: 4rem; font-weight: bold; margin: 10px 0; color: #ffffff; }
        
        .btn-group {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }
        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-next { background-color: #00b4d8; color: white; }
        .btn-next:hover { background-color: #0096c7; }
        .btn-recall { background-color: #f77f00; color: white; }
        .btn-recall:hover { background-color: #fcbf49; }
        
        .status-text { margin-top: 15px; font-size: 0.9rem; color: #a8dadc; }
    </style>
</head>
<body>

    <div class="container">
        <h1>KAUNTER STAF</h1>
        <p>Sistem Pengurusan Giliran Klinik</p>

        <div class="setup-section">
            <label for="kaunterSelect" style="display:block; margin-bottom:8px; font-weight:bold;">PILIH KAUNTER ANDA:</label>
            <select id="kaunterSelect" onchange="kemaskiniKaunter()">
                <option value="Kaunter 1 (Ibu & Anak)">Kaunter 1 (Ibu & Anak)</option>
                <option value="Kaunter 2 (Doktor)">Kaunter 2 (Doktor)</option>
                <option value="Kaunter 3 (Farmasi)">Kaunter 3 (Farmasi)</option>
            </select>
        </div>

        <div class="display-box">
            <div class="label" id="namaKaunterPapar">Kaunter 1 (Ibu & Anak)</div>
            <div class="number" id="noSemasaPapar">---</div>
        </div>

        <div class="btn-group">
            <button class="btn-next" onclick="panggilSeterusnya()">CALL NEXT 📢</button>
            <button class="btn-recall" onclick="panggilSemula()">RECALL 🔄</button>
        </div>

        <div class="status-text" id="statusPapar">Sedia digunakan...</div>
    </div>

    <script>
        let namaKaunterLokal = "Kaunter 1 (Ibu & Anak)";
        let noTiketSemasaLokal = "---";

        function kemaskiniKaunter() {
            namaKaunterLokal = document.getElementById("kaunterSelect").value;
            document.getElementById("namaKaunterPapar").innerText = namaKaunterLokal;
            document.getElementById("statusPapar").innerText = `Bertukar ke ${namaKaunterLokal}`;
        }

        // FUNGSI UTAMA: Ambil tiket seterusnya dari server dan panggil
        async function panggilSeterusnya() {
            document.getElementById("statusPapar").innerText = "Meminta data dari server Cloud...";
            try {
                // Hantar arahan ke server untuk "pop" tiket paling depan dalam senarai (FIFO)
                const infoKaunterPilihan = (namaKaunterLokal.includes("1")) ? 1 : (namaKaunterLokal.includes("2") ? 2 : 3);
                
                const respon = await fetch(`/api/panggil-next?kaunter=${infoKaunterPilihan}`);
                const data = await respon.json();

                if (data.status === "berjaya" && data.tiket) {
                    noTiketSemasaLokal = data.tiket;
                    document.getElementById("noSemasaPapar").innerText = noTiketSemasaLokal;
                    document.getElementById("statusPapar").innerText = `Berjaya memanggil tiket ${noTiketSemasaLokal}`;
                } else {
                    document.getElementById("statusPapar").innerText = "Tiada tiket menunggu dalam senarai giliran.";
                }
            } catch (ralat) {
                console.error(ralat);
                document.getElementById("statusPapar").innerText = "Ralat: Gagal berhubung dengan Cloud Server.";
            }
        }

        // FUNGSI KEDUA: Panggil semula nombor yang sama
        async function panggilSemula() {
            if (noTiketSemasaLokal === "---") {
                document.getElementById("statusPapar").innerText = "Sila panggil tiket baru dahulu sebelum RECALL.";
                return;
            }
            document.getElementById("statusPapar").innerText = `Memanggil semula tiket ${noTiketSemasaLokal}...`;
            try {
                // Tembak semula ke API panggil suara
                await fetch('/api/tiket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tiket: noTiketSemasaLokal })
                });
                document.getElementById("statusPapar").innerText = `Recall berjaya untuk ${noTiketSemasaLokal}`;
            } catch (ralat) {
                document.getElementById("statusPapar").innerText = "Ralat semasa melakukan Recall.";
            }
        }
    </script>
</body>
</html>
