<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Skrin Panggilan Staf</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #eef2f3; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #2c3e50; }
        #nomborTiket { font-size: 80px; color: #e74c3c; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>TIKET SEKARANG</h1>
        <div id="nomborTiket">---</div>
        <p>Menunggu panggilan tiket daripada peranti Pico...</p>
    </div>

    <script>
        const socket = io(); // Auto-connect mengikut domain semasa
        socket.on('tiketBaru', (noTiket) => {
            document.getElementById('nomborTiket').innerText = noTiket;
        });
    </script>
</body>
</html>
